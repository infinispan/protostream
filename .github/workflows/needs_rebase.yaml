name: Needs Rebase Check

on:
  pull_request_target:
    types:
      - synchronize
  push:
    branches:
      - '*.0.x'
      - 'main'

permissions:
  contents: read

jobs:
  triage:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: eps1lon/actions-label-merge-conflict@0273be72a0bbd58fcd71d0d6c02c209b50d1e5e1 # releases/2.x
        with:
          dirtyLabel: "pr/needs rebase"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
